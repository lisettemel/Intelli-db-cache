version: "3.8"

services:
  # ----- Servicio: PostgreSQL -----
  db:
    image: postgres:16-alpine
    container_name: intellidns_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-intellidns}
      POSTGRES_USER: ${DB_USER:-intellidns_backend_client}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?}
    volumes:
      - ../database/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
      - ../database/functions.sql:/docker-entrypoint-initdb.d/02_functions.sql:ro
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${DB_BIND_IP:-127.0.0.1}:5432:5432"
    networks:
      - intellidns_net

  # ----- Servicio: Redis -----
  redis:
    image: redis:7-alpine
    container_name: intellidns_redis
    restart: unless-stopped
    command:
      - redis-server
      - /usr/local/etc/redis/redis.conf
      - --requirepass
      - ${REDIS_PASSWORD:?}
    volumes:
      - ./redis.conf:/usr/local/etc/redis/redis.conf
    ports:
      - "${REDIS_BIND_IP:-127.0.0.1}:6379:6379"
    networks:
      - intellidns_net

networks:
  intellidns_net:
    driver: bridge

volumes:
  postgres_data:
    driver: local
