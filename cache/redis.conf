# ============================================================
# intelli-dns — Configuración Endurecida de Redis para Caché
# Optimizado para RAM y alto rendimiento. Evita competir con el disco de Postgres.
# ============================================================

# ----- Red y Seguridad -----
# Enlazar a localhost e interfaces locales. En contenedores se puede usar 0.0.0.0,
# pero el acceso debe restringirse por firewall y red privada.
bind 0.0.0.0
port 6379

# Habilitar el modo protegido para evitar conexiones no autenticadas
protected-mode yes

# Contraseña requerida para acceder al caché (REEMPLAZAR con una frase segura)
# En Docker Compose se puede inyectar o leer desde este archivo config.
requirepass intellidbcache_secure_pass_2026

# ----- Deshabilitar/Renombrar comandos peligrosos -----
# Esto mitiga riesgos en caso de accesos no autorizados accidentales.
rename-command FLUSHDB ""
rename-command FLUSHALL ""
rename-command CONFIG ""
rename-command SHUTDOWN ""
rename-command DEBUG ""

# ----- Optimización RAM vs Disco (No compiten) -----
# Dado que es un caché puro de RAM, deshabilitamos la persistencia en disco (RDB y AOF)
# para evitar competir por operaciones de I/O en disco con PostgreSQL.
save ""
appendonly no

# ----- Límites de Memoria y Desalojo -----
# Establecer un límite máximo de memoria RAM para Redis
maxmemory 256mb

# Política de desalojo cuando se alcanza el límite:
# allkeys-lru: Desaloja cualquier llave (incluso sin TTL) usando el algoritmo Least Recently Used.
# Excelente para caché general ya que expira lo menos consultado.
maxmemory-policy allkeys-lru

# Muestras para el algoritmo aproximado de LRU (5 es el balance ideal rendimiento/precisión)
maxmemory-samples 5

# Activar la desfragmentación de memoria en caliente para mantener la RAM limpia
activedefrag yes
